name: CI/CD — GeoService

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/geo-service

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI — Build, Test & JaCoCo (todas las ramas)
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build, test & verificar cobertura JaCoCo (≥80%)
        run: chmod +x mvnw && ./mvnw -B verify

      - name: Publicar reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Build imagen Docker y push a GHCR (solo main)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Deploy al servidor remoto vía SSH (solo main)
  #
  # Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
  #   DEPLOY_HOST        IP o dominio del servidor
  #   DEPLOY_USER        Usuario SSH (ej. ubuntu)
  #   DEPLOY_SSH_KEY     Clave privada SSH (sin passphrase)
  #   DEPLOY_DIR         Ruta en el servidor (ej. /opt/alpha/geo-service)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Deploy vía SSH
        if: ${{ env.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Autenticarse en GHCR desde el servidor
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Detener y eliminar el contenedor anterior si existe
            docker stop geo-service 2>/dev/null || true
            docker rm   geo-service 2>/dev/null || true

            # Pull de la nueva imagen y arranque
            docker pull ${{ env.IMAGE_NAME }}:latest

            docker run -d \
              --name geo-service \
              --restart unless-stopped \
              -p 8082:8082 \
              -e SPRING_APPLICATION_NAME=geo-service \
              ${{ env.IMAGE_NAME }}:latest

            # Limpieza de imágenes antiguas
            docker image prune -f

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Deploy a Azure Container Apps (solo main)
  #
  # Secret requerido en GitHub → Settings → Secrets and variables → Actions:
  #   AZURE_CREDENTIALS   JSON de Service Principal (az ad sp create-for-rbac --sdk-auth)
  #                       scoped al resource group alpha-rf
  #
  # Recurso: Container App "alpha-geoservice" (East US 2, resource group alpha-rf)
  # sobre el environment "alpha-geoservice-env". Se actualiza al tag de imagen
  # exacto (sha corto) publicado por el job build-and-push, no ":latest",
  # para que cada push a main dispare una revisión nueva y verificable.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Actualizar Container App con nueva imagen
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade --only-show-errors
            IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
            IMAGE_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

            # El recurso alpha-geoservice quedo con properties.template.containers
            # en null (nunca se completo su creacion). En ese estado, "az containerapp
            # update" siempre crashea con "TypeError: 'NoneType' object is not iterable"
            # porque intenta iterar los containers existentes para mergear. La salida
            # es usar "create", que no hace merge y sobreescribe el recurso completo.
            CONTAINERS_COUNT=$(az containerapp show -g alpha-rf -n alpha-geoservice \
              --query "length(properties.template.containers || \`[]\`)" -o tsv 2>/dev/null || echo 0)

            if [ "$CONTAINERS_COUNT" = "0" ]; then
              echo "Container app sin containers definidos: recreando con az containerapp create"
              az containerapp create \
                -g alpha-rf -n alpha-geoservice \
                --environment alpha-geoservice-env \
                --image "${IMAGE_LOWER}:${IMAGE_TAG}" \
                --target-port 8082 \
                --ingress external \
                --min-replicas 1 --max-replicas 1 \
                --registry-server ghcr.io \
                --registry-username "${{ github.actor }}" \
                --registry-password "${{ secrets.GHCR_PAT }}"
            else
              az containerapp update \
                -g alpha-rf -n alpha-geoservice \
                --container-name alpha-geoservice \
                --image "${IMAGE_LOWER}:${IMAGE_TAG}"
            fi
