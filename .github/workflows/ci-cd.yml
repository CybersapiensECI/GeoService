name: CI/CD — GeoService

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/geo-service

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI — Build, Test & JaCoCo (todas las ramas)
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build, test & verificar cobertura JaCoCo (≥80%)
        run: chmod +x mvnw && ./mvnw -B verify

      - name: Publicar reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Build imagen Docker y push a GHCR (solo main)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Deploy al servidor remoto vía SSH (solo main)
  #
  # Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
  #   DEPLOY_HOST        IP o dominio del servidor
  #   DEPLOY_USER        Usuario SSH (ej. ubuntu)
  #   DEPLOY_SSH_KEY     Clave privada SSH (sin passphrase)
  #   DEPLOY_DIR         Ruta en el servidor (ej. /opt/alpha/geo-service)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Autenticarse en GHCR desde el servidor
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Detener y eliminar el contenedor anterior si existe
            docker stop geo-service 2>/dev/null || true
            docker rm   geo-service 2>/dev/null || true

            # Pull de la nueva imagen y arranque
            docker pull ${{ env.IMAGE_NAME }}:latest

            docker run -d \
              --name geo-service \
              --restart unless-stopped \
              -p 8082:8082 \
              -e SPRING_APPLICATION_NAME=geo-service \
              ${{ env.IMAGE_NAME }}:latest

            # Limpieza de imágenes antiguas
            docker image prune -f
